<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#051423">
	<title>Offline — PowerBall Jackpot</title>
	<style>
		* { box-sizing: border-box; }
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 24px;
			font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
			background: #051423;
			color: #e8eef5;
			text-align: center;
		}
		h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 12px; }
		p { margin: 0; color: #9aa4b2; font-size: 0.95rem; line-height: 1.5; max-width: 28rem; }
		a {
			display: inline-block;
			margin-top: 20px;
			padding: 10px 20px;
			background: #448c74;
			color: #fff;
			text-decoration: none;
			font-weight: 600;
			border-radius: 6px;
		}
		a:hover, a:focus { filter: brightness(1.08); }
	</style>
</head>
<body>
	<div>
		<h1>You are offline</h1>
		<p>Check your internet connection, then try again. Cached pages and assets may still be available after you reconnect.</p>
		<a href="/">Go to home</a>
	</div>
</body>
</html>
